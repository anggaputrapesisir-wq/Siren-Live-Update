<!DOCTYPE html>
<html>
<head>
  <title>SIREN LIVE COMMAND</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff9d;
      font-family: monospace;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .box {
      border: 1px solid #00ff9d;
      padding: 10px;
    }

    .big {
      font-size: 20px;
      font-weight: bold;
    }

    .danger {
      color: red;
    }

    .warn {
      color: orange;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">⚡ SIREN COMMAND TERMINAL ⚡</h2>

<div class="grid">

  <!-- PRICE -->
  <div class="box">
    <div class="big">PRICE</div>
    <div id="price">loading...</div>
    <div id="mc">MC: ...</div>
    <div id="vol">VOL: ...</div>
  </div>

  <!-- WHALE -->
  <div class="box">
    <div class="big">🐋 WHALE TRACKER</div>
    <div id="whale">loading...</div>
  </div>

  <!-- LIQUIDATION ZONE -->
  <div class="box">
    <div class="big">🔥 LIQUIDATION ZONE (EST)</div>
    <div id="liq">calculating...</div>
  </div>

  <!-- HEATMAP (external) -->
  <div class="box">
    <div class="big">HEATMAP</div>
    <iframe src="https://www.coinglass.com/pro/futures/LiquidationHeatMap"></iframe>
  </div>

</div>

<script>

const CA = "0x997a58129890bbda032231a52ed1ddc845fc18e1";

let lastPrice = 0;

// ===== FETCH PRICE + MARKET =====
async function fetchMarket() {
  try {
    const res = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + CA);
    const data = await res.json();

    const pair = data.pairs[0];

    const price = parseFloat(pair.priceUsd);
    lastPrice = price;

    document.getElementById("price").innerHTML =
      "$" + price.toFixed(8);

    document.getElementById("mc").innerHTML =
      "MC: $" + Number(pair.fdv).toLocaleString();

    document.getElementById("vol").innerHTML =
      "VOL: $" + Number(pair.volume.h24).toLocaleString();

  } catch (e) {
    console.log(e);
  }
}


// ===== WHALE DETECTOR =====
async function whaleTracker() {
  try {
    const res = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + CA);
    const data = await res.json();

    const tx = data.pairs[0].txns.h24;

    let status = "";

    if (tx.buys > tx.sells) {
      status = "🟢 BUY PRESSURE: " + tx.buys + " buys";
    } else {
      status = "🔴 SELL PRESSURE: " + tx.sells + " sells";
    }

    // fake whale detection indicator
    if (tx.buys + tx.sells > 500) {
      status += "<br><span class='warn'>⚠ HIGH ACTIVITY (WHALE POSSIBLE)</span>";
    }

    document.getElementById("whale").innerHTML = status;

  } catch (e) {
    console.log(e);
  }
}


// ===== LIQUIDATION ESTIMATOR (SIMULATED) =====
function liquidationEstimator() {
  if (!lastPrice) return;

  const longLiq = lastPrice * 0.90;
  const shortLiq = lastPrice * 1.10;
  const extreme = lastPrice * 0.85;

  document.getElementById("liq").innerHTML = `
    LONG LIQ: <span class="danger">$${longLiq.toFixed(8)}</span><br>
    SHORT LIQ: <span class="warn">$${shortLiq.toFixed(8)}</span><br>
    EXTREME ZONE: <span class="danger">$${extreme.toFixed(8)}</span>
  `;
}


// ===== AUTO LOOP =====
async function loop() {
  await fetchMarket();
  await whaleTracker();
  liquidationEstimator();
}

loop();
setInterval(loop, 1500); // 1.5s realtime feel

</script>

</body>
</html>
